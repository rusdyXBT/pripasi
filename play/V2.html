<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            /* BACKGROUND AESTHETIC */
            background: url('https://w0.peakpx.com/wallpaper/424/399/HD-wallpaper-view-sky-aesthetic-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        .avatar {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 20px;
            border: 3px solid white;
            /* GIF AWAL: SEDIH */
            background: url('https://media.tenor.com/ZAt_p_9C9p8AAAAC/cat-sad.gif') center/cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: background-image 0.1s ease-in-out;
        }

        .text {
            font-size: 16px;
            min-height: 55px;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            transition: color 0.1s ease;
        }

        .btn-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        button {
            padding: 12px 0;
            font-size: 14px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            touch-action: none;
            transition: transform 0.1s;
        }

        #yes {
            background: #ffffff;
            color: #333;
            box-shadow: 0 4px 10px rgba(255,255,255,0.2);
        }

        #no {
            background: #ff5e5e;
            color: white;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(255,94,94,0.3);
            transition: all 0.1s ease; /* Super cepat */
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar" id="catGif"></div>
    <div id="text" class="text"></div>
    <div class="btn-wrapper">
        <button id="yes">Iyah</button>
        <button id="no">Enggak</button>
    </div>
</div>

<script>
    /* 🎵 MUSIK */
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;

    document.body.addEventListener("click", () => {
        music.play().catch(() => {});
    }, { once: true });

    /* 💬 TEKS */
    const messages = [
        "Upps! 😢 Hari raya ini harus saling maaf-maafan yaa 👀🤝",
        "Minall 'Aidin Walfaizin ✨ mohon maaf lahir dan batin 🙏",
        "Sebenernya rusdy cuma bercanda kok... 😭",
        "Tolong maapkan rusdy yaa 🗿"
    ];

    let step = 0;
    const textEl = document.getElementById("text");
    const catGifEl = document.getElementById("catGif");
    const noBtn = document.getElementById("no");

    function typeEffect(txt) {
        let i = 0;
        textEl.innerHTML = "";
        function type() {
            if (i < txt.length) {
                textEl.innerHTML += txt.charAt(i);
                i++;
                setTimeout(type, 40);
            }
        }
        type();
    }

    typeEffect(messages[step]);

    /* ✅ TOMBOL IYAH */
    document.getElementById("yes").onclick = () => {
        step++;
        if (step < messages.length) {
            typeEffect(messages[step]);
        } else {
            // GIF GANTI JADI KUCING SENANG/TERHARU
            catGifEl.style.backgroundImage = "url('https://media.tenor.com/7966A0D7p88AAAAC/cat-smile.gif')";
            textEl.style.color = "#aaffaa"; // Teks jadi hijau terang
            typeEffect("Makasih ya! ❤️ Kamu emang yang terbaik! 😭😭😭");
            document.querySelector(".btn-wrapper").style.display = "none";
        }
    };

    /* ❌ TOMBOL MARAH (FIXED UNTUK HP) */
    function kaburDanMarah(e) {
        if(e) e.preventDefault();
        
        // 1. GANTI GIF JADI KUCING MARAH
        catGifEl.style.backgroundImage = "url('https://media.tenor.com/7H_4zI1L_EAAAAAC/cat-angry.gif')";
        textEl.style.color = "#ff8888"; // Teks jadi merah
        
        // GANTI TEKS JADI GALAK
        textEl.innerHTML = "JANGAN DITEKAN! 😡 Rusdy ngambek nih!";

        // 2. LOGIKA KABUR
        noBtn.style.position = "fixed";
        noBtn.style.width = "100px"; 
        noBtn.style.zIndex = "999";

        const padding = 60;
        const maxX = window.innerWidth - 100 - padding;
        const maxY = window.innerHeight - 50 - padding;

        const randomX = Math.floor(Math.random() * maxX) + (padding/2);
        const randomY = Math.floor(Math.random() * maxY) + (padding/2);

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("touchstart", kaburDanMarah);
    noBtn.addEventListener("mouseover", kaburDanMarah);
    noBtn.addEventListener("click", kaburDanMarah);
</script>

</body>
</html>
