<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://w0.peakpx.com/wallpaper/424/399/HD-wallpaper-view-sky-aesthetic-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(3px, 2px); }
            60% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }

        .shaking { animation: shake 0.2s infinite; border: 2px solid #ff4d4d !important; }

        .card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 30px 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 20px;
            border: 3px solid white;
            background-image: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif');
            background-position: center;
            background-size: cover;
        }

        .text {
            font-size: 15px;
            min-height: 50px;
            margin-bottom: 25px;
            line-height: 1.4;
            font-weight: bold;
        }

        .btn-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        button {
            padding: 12px 5px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            touch-action: none;
        }

        #yes { background: white; color: black; }
        
        #no { 
            background: #ff4d4d; 
            color: white; 
            position: relative; 
            z-index: 1000;
            transition: left 0.2s ease, top 0.2s ease; /* Gerakan lebih smooth */
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="avatar" id="catGif"></div>
    <div id="text" class="text"></div>
    <div class="btn-wrapper" id="btnGroup">
        <button id="yes">Iyah dimaafin</button>
        <button id="no">Enggak!</button>
    </div>
</div>

<script>
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;
    document.body.onclick = () => { music.play().catch(() => {}); };

    const messages = ["Upps! 😢 Harus saling maaf-maafan yaa 👀🤝", "Minal 'Aidin Walfaizin ✨ Maaf lahir batin 🙏", "Maapkan Rusdy yaa? 👉👈"];
    let step = 0;
    const textEl = document.getElementById("text");
    const catGifEl = document.getElementById("catGif");
    const cardEl = document.getElementById("mainCard");
    const noBtn = document.getElementById("no");

    textEl.innerHTML = messages[step];

    document.getElementById("yes").onclick = () => {
        cardEl.classList.remove("shaking");
        step++;
        if (step < messages.length) {
            textEl.innerHTML = messages[step];
            catGifEl.style.backgroundImage = "url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif')";
        } else {
            catGifEl.style.backgroundImage = "url('https://media.giphy.com/media/ICOgUNoMPvG24/giphy.gif')";
            textEl.innerHTML = "Makasih! ❤️ Sayang kamu!";
            document.getElementById("btnGroup").style.display = "none";
        }
    };

    function lari(e) {
        if(e) e.preventDefault();
        
        // Ganti GIF Cony Brown Marah
        catGifEl.style.backgroundImage = "url('https://media1.tenor.com/m/Xo7F7x7uD7kAAAAC/cony-and-brown-angry.gif')";
        cardEl.classList.add("shaking");
        textEl.innerHTML = "JANGAN DITEKAN! 😡";

        noBtn.style.position = "fixed";
        noBtn.style.width = "100px";

        // AREA AMAN (Safe Zone)
        // Agar tombol tidak keluar layar atau jatuh ke bawah tak terlihat
        const margin = 50;
        const maxX = window.innerWidth - 110;
        const maxY = window.innerHeight - 60;

        // Random posisi tapi tetap di area pandangan mata
        const randomX = Math.max(margin, Math.floor(Math.random() * maxX));
        const randomY = Math.max(margin, Math.floor(Math.random() * maxY));

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("touchstart", lari);
    noBtn.addEventListener("mouseover", lari);
</script>
</body>
</html>
