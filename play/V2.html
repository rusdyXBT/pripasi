<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 🙏</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://w0.peakpx.com/wallpaper/492/653/HD-wallpaper-view-aesthetic-sky-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            perspective: 1000px; /* Penting untuk efek getar */
        }

        body::after {
            content: ""; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); z-index: 1;
        }

        /* --- PASUKAN 4 KUCING (SESUAI REQUEST) --- */
        .walker-area {
            width: 100%;
            position: absolute;
            top: -55px; left: 0;
            overflow: hidden;
            white-space: nowrap;
            pointer-events: none;
            z-index: 5;
        }

        .cat-walker {
            display: inline-block;
            width: 60px; height: 60px;
            background: url('https://raw.githubusercontent.com/rusdyXBT/Gifx/main/soft-meme.gif') center/cover no-repeat;
            animation: lariKiri 8s linear infinite; /* Sedikit diperlambat biar santai */
            transform: translateX(100vw);
        }

        @keyframes lariKiri {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100vw); }
        }

        /* --- KARTU UTAMA DENGAN EFEK GETAR --- */
        .card {
            position: relative; z-index: 2;
            width: 92%; max-width: 350px;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px; padding: 25px 20px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-top: -50px;
            transition: transform 0.1s ease-in-out; /* Smooth vibration */
        }

        /* Animasi Getar Kartu */
        @keyframes vibrate {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-5px, 5px) rotate(-1deg); }
            40% { transform: translate(-5px, -5px) rotate(1deg); }
            60% { transform: translate(5px, 5px) rotate(-1deg); }
            80% { transform: translate(5px, -5px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .card.vibrate-mode {
            animation: vibrate 0.3s linear infinite;
        }

        .avatar {
            width: 130px; height: 130px; margin: 10px auto 15px;
            border-radius: 20px; border: 4px solid white;
            background-position: center; background-size: cover;
            background-color: rgba(255,255,255,0.2);
            transition: 0.3s;
            background-image: url('https://media.tenor.com/8m_l17VId8MAAAAC/cat-sad.gif'); /* INTRO GIF LANGSUNG MUNCUL */
        }

        .text { 
            font-size: 18px; 
            line-height: 1.5;
            min-height: 110px; 
            margin-bottom: 20px; 
            font-weight: bold; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
        }

        /* --- TOMBOL RESTORED & STABLE --- */
        .btn-wrapper { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            opacity: 0; /* Mulai dari transparan, muncul setelah ngetik selesai */
            transition: opacity 0.5s;
            position: relative; /* Penting untuk tombol No */
        }

        button {
            padding: 12px 5px; font-size: 14px; font-weight: bold;
            border-radius: 15px; border: none; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active { transform: scale(0.95); }

        #yes { background: white; color: #ff4d6d; }
        
        #no { 
            background: #ff4d4d; color: white; 
            position: relative; z-index: 10; 
            /* Tombol No tidak boleh pindah-pindah fixed lagi agar getar terasa di kartu */
        }

        .heart {
            position: absolute; color: #ff4d6d; font-size: 25px;
            pointer-events: none; animation: fly 2s linear forwards;
            z-index: 10;
        }
        @keyframes fly { 0% { opacity: 1; } 100% { transform: translateY(-180px); opacity: 0; } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="walker-area">
        <div class="cat-walker" style="animation-delay: 0s;"></div>
        <div class="cat-walker" style="animation-delay: 2s;"></div>
        <div class="cat-walker" style="animation-delay: 4s;"></div>
        <div class="cat-walker" style="animation-delay: 6s;"></div>
    </div>

    <div class="avatar" id="catGif"></div>
    <div id="text" class="text"></div>
    
    <div class="btn-wrapper" id="btnGroup">
        <button id="yes">Iyah dimaafin</button>
        <button id="no">Enggak!</button>
    </div>
</div>

<script>
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;
    
    const textEl = document.getElementById("text");
    const btnGroup = document.getElementById("btnGroup");
    const catGifEl = document.getElementById("catGif");
    const noBtn = document.getElementById("no");
    const mainCard = document.getElementById("mainCard");

    let step = 0;

    const texts = [
        "Minal aidin walpaidin mon maap lahir batin 🙏🙏",
        "Maapkan Rusdy kalaw ada salah memang Rusdy suka memaki dan membuli",
        "tetapi ntu semuwa memang hoby 🗿🗿"
    ];

    const gifs = [
        "https://media.tenor.com/8m_l17VId8MAAAAC/cat-sad.gif", // Intro
        "https://media.tenor.com/GfV6S6I_h9AAAAAC/cat-cute.gif",
        "https://media.tenor.com/7966A0D7p88AAAAC/cat-smile.gif"
    ];

    const angryGifs = [
        "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-rTRYbFx38K.gif",
        "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-YNbTiWGdcr.gif"
    ];

    // --- TYPING SANTAI (REQUEST) ---
    function typeWriter(text, element, callback) {
        let i = 0;
        element.innerHTML = "";
        btnGroup.style.opacity = "0"; // Sembunyikan tombol saat ngetik
        
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                // Kecepatan diubah dari 100ms ke 150ms biar lebih santai
                setTimeout(type, 150); 
            } else if (callback) {
                // Beri jeda sedikit setelah selesai ngetik sebelum tombol muncul
                setTimeout(callback, 500);
            }
        }
        type();
    }

    // --- FUNGSI CONFETTI & HEARTS ---
    function launchConfetti() {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }

    function createHeart() {
        const h = document.createElement("div");
        h.innerHTML = "❤️"; h.className = "heart";
        h.style.left = Math.random() * 80 + 10 + "%";
        h.style.top = "50%";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 2000);
    }

    // --- INISIALISASI ---
    window.onload = () => {
        // GIF Intro sudah diset di CSS
        typeWriter(texts[0], textEl, () => {
            btnGroup.style.opacity = "1";
        });
    };

    // --- LOGIKA TOMBOL "IYAH" ---
    document.getElementById("yes").onclick = () => {
        // Matikan efek getar jika ada
        mainCard.classList.remove("vibrate-mode");
        
        step++;
        createHeart();
        launchConfetti();
        
        if (step === 1) {
            typeWriter(texts[1], textEl, () => { btnGroup.style.opacity = "1"; });
            catGifEl.style.backgroundImage = `url('${gifs[1]}')`;
        } else if (step === 2) {
            typeWriter(texts[2], textEl, () => { btnGroup.style.opacity = "1"; });
            catGifEl.style.backgroundImage = `url('${gifs[2]}')`;
        } else {
            textEl.innerHTML = "Janji nggak nakal lagi! 🐱💕 (Atau nunggu hobi kambuh 🗿)";
            catGifEl.style.backgroundImage = "url('https://media.tenor.com/vFKqnCdLPNOKcAAAAC/kiss-cat.gif')";
            btnGroup.style.display = "none";
            setInterval(createHeart, 300);
            setInterval(launchConfetti, 1500); 
        }
    };

    // --- LOGIKA TOMBOL "ENGGAK" -> WAJIB GETER (REQUEST) ---
    function triggerVibration() {
        // 1. Geter fisik di HP (Vibration API)
        if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200]); // Geter-jeda-geter
        }

        // 2. Geter visual di Kartu (CSS Animation)
        mainCard.classList.add("vibrate-mode");
        
        // Ubah teks dan GIF jadi marah
        let randomAngry = angryGifs[Math.floor(Math.random() * angryGifs.length)];
        catGifEl.style.backgroundImage = `url('${randomAngry}')`;
        textEl.innerHTML = "JANGAN PENCET ENGGAK!!! KARTUNYA JADI MARAH KAN! 😡🔥";
        
        // Sembunyikan tombol 'No' sementara biar kapok
        noBtn.style.display = "none";
        
        // Kembalikan tombol 'No' setelah 3 detik
        setTimeout(() => {
            noBtn.style.display = "inline-block";
        }, 3000);
    }

    // Pakai 'click' atau 'touchstart' biar getar terasa langsung pas ditekan
    noBtn.addEventListener("click", triggerVibration);
    noBtn.addEventListener("touchstart", (e) => { 
        e.preventDefault(); // Cegah double tap
        triggerVibration(); 
    });

    // Musik Jalan pas interaksi pertama
    document.body.onclick = () => { music.play().catch(() => {}); };
</script>
</body>
</html>
