<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://i.imgur.com/3ZQ3Z4D.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 15px;
            border: 2px solid white;
            /* Ganti GIF/Foto di sini */
            background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif') center/cover;
        }

        .text {
            font-size: 15px;
            min-height: 50px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* SISTEM SATU BARIS (ONE LINE) */
        .btn-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Membagi dua sama rata */
            gap: 12px;
            width: 100%;
        }

        button {
            padding: 12px 0;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            touch-action: none; /* Penting untuk HP */
        }

        #yes {
            background: white;
            color: black;
        }

        #no {
            background: #ff4d4d;
            color: white;
            position: relative; /* Tetap di grid sampai disentuh */
            z-index: 100;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar"></div>
    <div id="text" class="text"></div>
    <div class="btn-wrapper">
        <button id="yes">Iyah</button>
        <button id="no">Enggak</button>
    </div>
</div>

<script>
    /* 🎵 MUSIK */
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;

    document.body.addEventListener("click", () => {
        music.play().catch(() => {});
    }, { once: true });

    /* 💬 TEKS */
    const messages = [
        "Upps! 😢 Hari raya ini harus saling maaf-maafan yaa 👀🤝",
        "Minall 'Aidin Walfaizin ✨ mohon maaf lahir dan batin 🙏",
        "Sebenernya rusdy cuma bercanda kok... 😭",
        "Tolong maapkan rusdy 🗿"
    ];

    let step = 0;
    const textEl = document.getElementById("text");

    function typeEffect(txt) {
        let i = 0;
        textEl.innerHTML = "";
        function type() {
            if (i < txt.length) {
                textEl.innerHTML += txt.charAt(i);
                i++;
                setTimeout(type, 40);
            }
        }
        type();
    }

    typeEffect(messages[step]);

    /* ✅ TOMBOL IYAH */
    document.getElementById("yes").onclick = () => {
        step++;
        if (step < messages.length) {
            typeEffect(messages[step]);
        } else {
            typeEffect("Makasih ya udah dimaafin! ❤️😭");
            document.querySelector(".btn-wrapper").style.visibility = "hidden";
        }
    };

    /* ❌ TOMBOL KABUR (FIXED UNTUK HP) */
    const noBtn = document.getElementById("no");

    function lari(e) {
        if(e) e.preventDefault();
        
        // Ubah jadi melayang agar tidak merusak baris tombol Iyah
        noBtn.style.position = "fixed";
        noBtn.style.width = "100px"; // Ukuran tetap pas melayang

        const padding = 60;
        const maxX = window.innerWidth - 100 - padding;
        const maxY = window.innerHeight - 50 - padding;

        const randomX = Math.floor(Math.random() * maxX) + (padding/2);
        const randomY = Math.floor(Math.random() * maxY) + (padding/2);

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("touchstart", lari);
    noBtn.addEventListener("mouseover", lari);
    noBtn.addEventListener("click", lari);
</script>

</body>
</html>
