<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://w0.peakpx.com/wallpaper/424/399/HD-wallpaper-view-sky-aesthetic-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Overlay Blur */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1;
        }

        /* Animasi Shake/Getar pas marah */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10px { transform: translate(-1px, -2px) rotate(-1deg); }
            20px { transform: translate(-3px, 0px) rotate(1deg); }
            30px { transform: translate(3px, 2px) rotate(0deg); }
            40px { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        .card {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .shaking {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
            border: 2px solid #ff4d4d;
        }

        .avatar {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 20px;
            border: 3px solid white;
            background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif') center/cover;
            transition: 0.3s;
        }

        .text {
            font-size: 16px;
            min-height: 55px;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .btn-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        button {
            padding: 12px 0;
            font-size: 14px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            touch-action: none;
        }

        #yes {
            background: white;
            color: black;
            box-shadow: 0 5px 0 #ccc;
        }

        #yes:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #no {
            background: #ff4d4d;
            color: white;
            position: relative;
            z-index: 100;
        }

        /* Salju Melayang */
        .snow {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="avatar" id="catGif"></div>
    <div id="text" class="text"></div>
    <div class="btn-wrapper">
        <button id="yes">Iyah</button>
        <button id="no">Enggak</button>
    </div>
</div>

<script>
    /* 🎵 MUSIK */
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;
    document.body.onclick = () => { music.play(); };

    /* 💬 TEKS */
    const messages = [
        "Upps! 😢 Harus saling maaf-maafan yaa 👀🤝",
        "Minal 'Aidin Walfaizin ✨ Maaf lahir batin 🙏",
        "Sebenernya Rusdy cuma bercanda kok... 😭",
        "Tolong maapkan Rusdy yaa 🗿"
    ];

    let step = 0;
    const textEl = document.getElementById("text");
    const catGifEl = document.getElementById("catGif");
    const cardEl = document.getElementById("mainCard");
    const noBtn = document.getElementById("no");

    function typeWriter(txt) {
        let i = 0;
        textEl.innerHTML = "";
        function type() {
            if (i < txt.length) {
                textEl.innerHTML += txt.charAt(i);
                i++;
                setTimeout(type, 40);
            }
        }
        type();
    }

    typeWriter(messages[step]);

    /* KLIK IYAH */
    document.getElementById("yes").onclick = () => {
        cardEl.classList.remove("shaking");
        step++;
        if (step < messages.length) {
            typeWriter(messages[step]);
            catGifEl.style.backgroundImage = "url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif')";
        } else {
            catGifEl.style.backgroundImage = "url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/ICOgUNoMPvG24/giphy.gif')";
            typeWriter("Makasih ya udah dimaafin! ❤️ Sayang kamu!");
            document.querySelector(".btn-wrapper").style.display = "none";
        }
    };

    /* TOMBOL KABUR + EFEK MARAH */
    function lariDanMarah(e) {
        if(e) e.preventDefault();
        
        // Ganti GIF marah & kartu bergetar
        catGifEl.style.backgroundImage = "url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/mlvseq9yvZhba/giphy.gif')";
        cardEl.classList.add("shaking");
        textEl.innerHTML = "JANGAN DITEKAN! 😡 <br> Rusdy ngambek nih!";
        textEl.style.color = "#ff8888";

        noBtn.style.position = "fixed";
        noBtn.style.width = "100px"; 

        const p = 50;
        const x = Math.random() * (window.innerWidth - 100 - p) + p/2;
        const y = Math.random() * (window.innerHeight - 50 - p) + p/2;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("touchstart", lariDanMarah);
    noBtn.addEventListener("mouseover", lariDanMarah);

    /* EFEK SALJU */
    function createSnow() {
        const snow = document.createElement("div");
        snow.classList.add("snow");
        snow.style.left = Math.random() * 100 + "vw";
        snow.style.animationDuration = Math.random() * 3 + 2 + "s";
        snow.style.width = snow.style.height = Math.random() * 5 + 2 + "px";
        document.body.appendChild(snow);
        
        const anim = snow.animate([
            { transform: `translateY(-10px)` },
            { transform: `translateY(100vh)` }
        ], { duration: Math.random() * 3000 + 3000, iterations: Infinity });

        setTimeout(() => { snow.remove(); }, 6000);
    }
    setInterval(createSnow, 200);

</script>

</body>
</html>
