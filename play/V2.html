<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://w0.peakpx.com/wallpaper/424/399/HD-wallpaper-view-sky-aesthetic-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
        }

        body::after {
            content: ""; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); z-index: 1;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(3px, 2px); }
            100% { transform: translate(1px, 1px); }
        }
        .shaking { animation: shake 0.2s infinite; border: 2px solid #ff4d4d !important; }

        .card {
            position: relative; z-index: 2;
            width: 90%; max-width: 320px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px; padding: 30px 15px;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .avatar {
            width: 140px; height: 140px; margin: 0 auto 20px;
            border-radius: 20px; border: 3px solid white;
            background-position: center; background-size: cover;
            transition: background-image 0.3s ease;
        }

        .text { font-size: 15px; min-height: 50px; margin-bottom: 25px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .btn-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }

        button {
            padding: 12px 5px; font-size: 13px; font-weight: bold;
            border-radius: 12px; border: none; cursor: pointer; touch-action: none;
        }

        #yes { background: white; color: black; position: relative; z-index: 3; transition: 0.2s; }
        #no { 
            background: #ff4d4d; color: white; position: relative; z-index: 1000;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart {
            position: absolute; color: #ff4d4d; font-size: 25px;
            pointer-events: none; animation: fly 2s linear forwards; z-index: 10;
        }
        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(2) rotate(25deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="avatar" id="catGif"></div>
    <div id="text" class="text">Halo? Maafin Rusdy ya... 👉👈</div>
    <div class="btn-wrapper" id="btnGroup">
        <button id="yes">Iyah dimaafin</button>
        <button id="no">Enggak!</button>
    </div>
</div>

<script>
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;
    document.body.onclick = () => { music.play().catch(() => {}); };

    const catGifEl = document.getElementById("catGif");
    const textEl = document.getElementById("text");
    const cardEl = document.getElementById("mainCard");
    const noBtn = document.getElementById("no");

    let yesStep = 0;
    let noStep = 0;

    // --- DATA KONTEN (SUDAH PAKAI GIF GITHUB KAMU) ---
    const content = {
        awal: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif",
        
        no: [
            { t: "Kok ditekan sih? Sedih tau.. 🥺", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-rTRYbFx38K.gif" },
            { t: "JANGAN DITEKAN TERUS! 😡", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-YNbTiWGdcr.gif" },
            { t: "AAAAAAHHH!!! JAHAT! 😱", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-xKnUJBPzZf.gif" },
            { t: "RUSDY NGAMBEK BENERAN!!! 😤", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-QCaiGlMeJg.gif" }
        ],

        yes: [
            { t: "Beneran dimaafin? 🥺", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif" },
            { t: "Hehe, makasih yaaa ✨", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/ICOgUNoMPvG24/giphy.gif" },
            { t: "Rusdy janji nggak nakal lagi! 💖", g: "https://media.tenor.com/7966A0D7p88AAAAC/cat-smile.gif" },
            { t: "SAYANG KAMU BANYAK-BANYAK! ❤️", g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGJ4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/ICOgUNoMPvG24/giphy.gif" }
        ]
    };

    catGifEl.style.backgroundImage = `url('${content.awal}')`;

    // --- KLIK IYAH ---
    document.getElementById("yes").onclick = () => {
        cardEl.classList.remove("shaking");
        textEl.style.color = "white";

        if (yesStep < content.yes.length) {
            textEl.innerHTML = content.yes[yesStep].t;
            catGifEl.style.backgroundImage = `url('${content.yes[yesStep].g}')`;
            yesStep++;
            createHeart();
        }

        if (yesStep === content.yes.length) {
            document.getElementById("btnGroup").style.display = "none";
            startFinalEffect();
        }
    };

    // --- KLIK ENGGAK (KABUR + GANTI GIF GITHUB) ---
    function lari(e) {
        if(e) e.preventDefault();
        
        let idx = Math.min(noStep, content.no.length - 1);
        textEl.innerHTML = content.no[idx].t;
        catGifEl.style.backgroundImage = `url('${content.no[idx].g}')`;
        cardEl.classList.add("shaking");
        textEl.style.color = "#ff8888";
        noStep++;

        noBtn.style.position = "fixed";
        noBtn.style.width = "100px";
        const margin = 60;
        const maxX = window.innerWidth - 100 - margin;
        const maxY = window.innerHeight * 0.6; 
        const randomX = Math.floor(Math.random() * (maxX - margin)) + margin;
        const randomY = Math.floor(Math.random() * (maxY - 100)) + 100;

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("touchstart", lari);
    noBtn.addEventListener("mouseover", lari);

    function createHeart() {
        const h = document.createElement("div");
        h.innerHTML = "❤️"; h.className = "heart";
        h.style.left = Math.random() * 80 + 10 + "%";
        h.style.top = "50%";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 2000);
    }

    function startFinalEffect() {
        textEl.style.color = "#aaffaa";
        setInterval(createHeart, 250);
        cardEl.style.transform = "scale(1.1)";
        cardEl.style.background = "rgba(255, 100, 100, 0.4)";
        cardEl.style.border = "2px solid #ff4d4d";
    }
</script>
</body>
</html>
