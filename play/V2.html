<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://w0.peakpx.com/wallpaper/424/399/HD-wallpaper-view-sky-aesthetic-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1;
        }

        @keyframes shakyGalak {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -1px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }

        .shaking { animation: shakyGalak 0.3s infinite; border: 2px solid #ff1111 !important; }

        .card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 30px 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 20px;
            border: 3px solid white;
            /* GIF AWAL: KUCING SEDIH */
            background-image: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif');
            background-position: center;
            background-size: cover;
            transition: 0.2s;
        }

        .text {
            font-size: 15px;
            min-height: 50px;
            margin-bottom: 25px;
            line-height: 1.4;
            font-weight: bold;
        }

        .btn-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 12px 5px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            touch-action: none;
        }

        #yes { background: white; color: black; }
        #no { background: #ff4d4d; color: white; position: relative; z-index: 100; transition: all 0.1s ease; }

        .snow { position: absolute; background: white; border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0.5; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="avatar" id="catGif"></div>
    <div id="text" class="text"></div>
    <div class="btn-wrapper" id="btnGroup">
        <button id="yes">Iyah dimaafin</button>
        <button id="no">Enggak!</button>
    </div>
</div>

<script>
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;
    document.body.onclick = () => { music.play().catch(() => {}); };

    const messages = [
        "Upps! 😢 Harus saling maaf-maafan yaa 👀🤝",
        "Minal 'Aidin Walfaizin ✨ Maaf lahir batin 🙏",
        "Sebenernya Rusdy cuma bercanda kok... 😭",
        "Maapkan Rusdy yaa? 👉👈"
    ];

    let step = 0;
    const textEl = document.getElementById("text");
    const catGifEl = document.getElementById("catGif");
    const cardEl = document.getElementById("mainCard");
    const noBtn = document.getElementById("no");

    function typeWriter(txt) {
        let i = 0;
        textEl.innerHTML = "";
        function type() {
            if (i < txt.length) {
                textEl.innerHTML += txt.charAt(i);
                i++;
                setTimeout(type, 40);
            }
        }
        type();
    }

    typeWriter(messages[step]);

    document.getElementById("yes").onclick = () => {
        cardEl.classList.remove("shaking");
        step++;
        if (step < messages.length) {
            typeWriter(messages[step]);
            // Balik ke sedih
            catGifEl.style.backgroundImage = "url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif')";
        } else {
            // KUCING SENANG
            catGifEl.style.backgroundImage = "url('https://media.giphy.com/media/ICOgUNoMPvG24/giphy.gif')";
            typeWriter("Makasih! ❤️ Sayang kamu!");
            document.getElementById("btnGroup").style.display = "none";
        }
    };

    function lariDanMarah(e) {
        if(e) e.preventDefault();
        
        // PAKAI LINK DIRECT BIAR PASTI MUNCUL (CONY BROWN MARAH)
        catGifEl.style.backgroundImage = "url('https://media.tenor.com/7H_4zI1L_EAAAAAC/cat-angry.gif')";
        
        cardEl.classList.add("shaking");
        textEl.innerHTML = "JANGAN DITEKAN! 😡 <br> Rusdy ngambek nih!";
        textEl.style.color = "#ff8888";

        noBtn.style.position = "fixed";
        noBtn.style.width = "100px"; 
        noBtn.style.zIndex = "999";

        const p = 50;
        const x = Math.random() * (window.innerWidth - 100 - p) + p/2;
        const y = Math.random() * (window.innerHeight - 50 - p) + p/2;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("touchstart", lariDanMarah);
    noBtn.addEventListener("mouseover", lariDanMarah);

    // Animasi Salju
    setInterval(() => {
        const snow = document.createElement("div");
        snow.classList.add("snow");
        snow.style.left = Math.random() * 100 + "vw";
        snow.style.width = snow.style.height = Math.random() * 5 + 2 + "px";
        document.body.appendChild(snow);
        snow.animate([{ transform: 'translateY(-10px)' }, { transform: 'translateY(100vh)' }], { duration: 5000 });
        setTimeout(() => snow.remove(), 5000);
    }, 200);
</script>

</body>
</html>
