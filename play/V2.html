<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 🙏</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://w0.peakpx.com/wallpaper/492/653/HD-wallpaper-view-aesthetic-sky-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            perspective: 1000px;
        }

        body::after {
            content: ""; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); z-index: 1;
        }

        /* --- OVERLAY AWAL --- */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #overlay button {
            padding: 15px 30px; font-size: 16px; border-radius: 50px;
            border: none; background: #ff4d6d; color: white; cursor: pointer;
            font-weight: bold;
        }

        /* --- PASUKAN 4 KUCING --- */
        .walker-area {
            width: 100%; position: absolute; top: -55px; left: 0;
            overflow: hidden; white-space: nowrap; pointer-events: none; z-index: 5;
        }
        .cat-walker {
            display: inline-block; width: 60px; height: 60px;
            background: url('https://raw.githubusercontent.com/rusdyXBT/Gifx/main/soft-meme.gif') center/cover no-repeat;
            animation: lariKiri 8s linear infinite;
        }
        @keyframes lariKiri { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100vw); } }

        /* --- KARTU UTAMA --- */
        .card {
            position: relative; z-index: 10; width: 92%; max-width: 350px;
            background: rgba(255, 255, 255, 0.25); border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px; padding: 25px 20px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); display: none;
        }

        @keyframes vibrate {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            100% { transform: translate(0, 0); }
        }
        .vibrate-mode { animation: vibrate 0.2s linear infinite; }

        .avatar {
            width: 120px; height: 120px; margin: 0 auto 15px;
            border-radius: 20px; border: 3px solid white;
            background-position: center; background-size: cover;
            background-image: url('https://media.tenor.com/8m_l17VId8MAAAAC/cat-sad.gif');
        }

        .text { font-size: 18px; line-height: 1.5; min-height: 100px; margin-bottom: 20px; font-weight: bold; }

        .btn-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; opacity: 0; transition: 0.5s; }
        button { padding: 12px 5px; font-size: 14px; font-weight: bold; border-radius: 15px; border: none; cursor: pointer; }
        #yes { background: white; color: #ff4d6d; }
        #no { background: #ff4d4d; color: white; }

        /* --- EFEK LOVE BACKGROUND (FULL SCREEN) --- */
        .heart {
            position: fixed; 
            bottom: -50px; /* Start dari bawah layar */
            color: rgba(255, 77, 109, 0.7); /* Transparan biar nggak alay */
            font-size: 20px;
            pointer-events: none; 
            z-index: 2; /* Di belakang kartu (z-index 10) */
            animation: flyUp 4s linear forwards;
        }
        @keyframes flyUp { 
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5) rotate(45deg); opacity: 0; } 
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="avatar" style="margin-bottom: 20px;"></div>
    <button onclick="mulai()">Klik untuk Buka Pesan 💌</button>
</div>

<div class="card" id="mainCard">
    <div class="walker-area">
        <div class="cat-walker" style="animation-delay: 0s;"></div>
        <div class="cat-walker" style="animation-delay: 2s;"></div>
        <div class="cat-walker" style="animation-delay: 4s;"></div>
        <div class="cat-walker" style="animation-delay: 6s;"></div>
    </div>
    <div class="avatar" id="catGif"></div>
    <div id="text" class="text"></div>
    <div class="btn-wrapper" id="btnGroup">
        <button id="yes">Iyah dimaafin</button>
        <button id="no">Enggak!</button>
    </div>
</div>

<script>
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;
    
    const textEl = document.getElementById("text");
    const btnGroup = document.getElementById("btnGroup");
    const catGifEl = document.getElementById("catGif");
    const noBtn = document.getElementById("no");
    const mainCard = document.getElementById("mainCard");

    const texts = [
        "Minal aidin walpaidin mon maap lahir batin 🙏🙏",
        "Maapkan Rusdy kalaw ada salah memang Rusdy suka memaki dan membuli",
        "tetapi ntu semuwa memang hoby 🗿🗿"
    ];

    const normalGifs = [
        "https://media.tenor.com/8m_l17VId8MAAAAC/cat-sad.gif",
        "https://media.tenor.com/GfV6S6I_h9AAAAAC/cat-cute.gif",
        "https://media.tenor.com/7966A0D7p88AAAAC/cat-smile.gif"
    ];

    const angryGifs = [
        "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-rTRYbFx38K.gif",
        "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-YNbTiWGdcr.gif",
        "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-xKnUJBPzZf.gif",
        "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-QCaiGlMeJg.gif"
    ];

    let step = 0;
    let angryIdx = 0;

    function mulai() {
        document.getElementById("overlay").style.display = "none";
        mainCard.style.display = "block";
        music.play();
        typeWriter(texts[0], textEl, () => { btnGroup.style.opacity = "1"; });
    }

    function typeWriter(text, element, callback) {
        let i = 0;
        element.innerHTML = "";
        btnGroup.style.opacity = "0";
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 150);
            } else if (callback) {
                setTimeout(callback, 500);
            }
        }
        type();
    }

    function createHeart() {
        const h = document.createElement("div");
        h.innerHTML = "❤️"; h.className = "heart";
        // Posisi random dari ujung kiri ke ujung kanan layar
        h.style.left = Math.random() * 100 + "vw";
        // Ukuran random biar variatif
        h.style.fontSize = Math.random() * 20 + 15 + "px";
        // Durasi meluncur random biar nggak barengan terus
        h.style.animationDuration = Math.random() * 2 + 3 + "s";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 5000);
    }

    document.getElementById("yes").onclick = () => {
        mainCard.classList.remove("vibrate-mode");
        step++;
        // Efek love setiap klik
        for(let i=0; i<10; i++) setTimeout(createHeart, i * 150);
        
        if (step === 1) {
            typeWriter(texts[1], textEl, () => { btnGroup.style.opacity = "1"; });
            catGifEl.style.backgroundImage = `url('${normalGifs[1]}')`;
        } else if (step === 2) {
            typeWriter(texts[2], textEl, () => { btnGroup.style.opacity = "1"; });
            catGifEl.style.backgroundImage = `url('${normalGifs[2]}')`;
        } else {
            textEl.innerHTML = "Janji nggak nakal lagi! 🐱💕";
            catGifEl.style.backgroundImage = "url('https://media.tenor.com/vFKqnCdLPNOKcAAAAC/kiss-cat.gif')";
            btnGroup.style.display = "none";
            // HUJAN LOVE BACKGROUND INTENS DI TERAKHIR
            setInterval(createHeart, 200); 
        }
    };

    noBtn.onclick = () => {
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        mainCard.classList.add("vibrate-mode");
        catGifEl.style.backgroundImage = `url('${angryGifs[angryIdx]}')`;
        angryIdx = (angryIdx + 1) % angryGifs.length;
        textEl.innerHTML = "Dibilangin JANGAN PENCET ENGGAK!!! 😡💢";
        noBtn.style.opacity = "0.5";
        setTimeout(() => { noBtn.style.opacity = "1"; }, 1000);
    };
</script>
</body>
</html>
