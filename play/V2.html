<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: url('https://i.imgur.com/3ZQ3Z4D.jpg') no-repeat center center;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 15px;
            border: 3px solid white;
            background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif') center/cover;
        }

        .text {
            font-size: 17px;
            min-height: 60px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            touch-action: none; /* Penting: mencegah scroll saat tap tombol */
        }

        #yes {
            background: white;
            color: black;
        }

        #no {
            background: #ff4d4d;
            color: white;
            position: relative; /* Posisi awal rapi */
            z-index: 999;
            transition: all 0.1s ease; /* Transisi sangat cepat agar responsif */
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar"></div>
    <div id="text" class="text"></div>
    <div class="btn-wrapper">
        <button id="yes">Iyah dimaapkan</button>
        <button id="no">Enggak!</button>
    </div>
</div>

<script>
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;

    document.body.addEventListener("click", () => {
        music.play().catch(() => {});
    }, { once: true });

    const messages = [
        "Upps! 😢 Hari raya ini harus saling maaf-maafan yaa 👀🤝",
        "Minall 'Aidin Walfaizin ✨ mohon maaf lahir dan batin 🙏",
        "Sebenernya rusdy cuma bercanda kok... 😭",
        "Tolong maapkan rusdy 🗿"
    ];

    let i = 0;
    const textEl = document.getElementById("text");

    function typeText(text) {
        let index = 0;
        textEl.innerHTML = "";
        const interval = setInterval(() => {
            textEl.innerHTML += text[index];
            index++;
            if (index >= text.length) clearInterval(interval);
        }, 40);
    }

    typeText(messages[i]);

    document.getElementById("yes").onclick = () => {
        i++;
        if (i < messages.length) {
            typeText(messages[i]);
        } else {
            typeText("Makasih ya udah dimaafin! ❤️😭");
            document.getElementById("no").style.display = "none";
            document.getElementById("yes").style.display = "none";
        }
    };

    /* FITUR KABUR YANG DIPERBAIKI TOTAL */
    const noBtn = document.getElementById("no");
    
    function moveButton(e) {
        // Jika kursor/jari menyentuh, langsung ubah ke fixed
        if (noBtn.style.position !== "fixed") {
            noBtn.style.position = "fixed";
        }

        // Ambil ukuran layar asli
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;

        // Hitung batas aman (agar tidak keluar layar)
        const padding = 20;
        const btnWidth = noBtn.offsetWidth;
        const btnHeight = noBtn.offsetHeight;

        // Koordinat acak
        const randomX = Math.floor(Math.random() * (screenWidth - btnWidth - (padding * 2))) + padding;
        const randomY = Math.floor(Math.random() * (screenHeight - btnHeight - (padding * 2))) + padding;

        // Terapkan posisi
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
        
        // Mencegah event klik sebenarnya terjadi (agar tidak bisa ditekan)
        if(e) e.preventDefault();
    }

    // Untuk PC (Kursor mendekat)
    noBtn.addEventListener("mouseover", moveButton);
    
    // Untuk HP (Disentuh jari)
    noBtn.addEventListener("touchstart", moveButton);

    // Mencegah klik paksa
    noBtn.addEventListener("click", (e) => {
        moveButton(e);
    });
</script>

</body>
</html>
