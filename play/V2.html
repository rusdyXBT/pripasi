<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maapkan Rusdy 😔</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('https://w0.peakpx.com/wallpaper/492/653/HD-wallpaper-view-aesthetic-sky-thumbnail.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
        }

        body::after {
            content: ""; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); z-index: 1;
        }

        /* --- BARISAN KUCING LARI DI ATAS ATAP KARTU --- */
        .walker-area {
            width: 100%;
            position: absolute;
            top: -55px; /* Posisinya pas di atas garis putih kartu */
            left: 0;
            overflow: hidden;
            white-space: nowrap;
            pointer-events: none;
            z-index: 5;
        }

        .cat-walker {
            display: inline-block;
            width: 60px;
            height: 60px;
            background: url('https://media.tenor.com/XpA9mE98jLIAAAAC/cat-run.gif') center/cover no-repeat;
            animation: jalan 4s linear infinite;
        }

        @keyframes jalan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(500%); }
        }

        .card {
            position: relative; z-index: 2;
            width: 90%; max-width: 320px;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px; padding: 30px 15px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-top: 60px; /* Jarak biar kucingnya gak kepotong layar atas */
        }

        .avatar {
            width: 150px; height: 150px; margin: 20px auto 20px;
            border-radius: 25px; border: 4px solid white;
            background-position: center; background-size: cover;
            background-color: rgba(255,255,255,0.2);
        }

        .text { font-size: 16px; min-height: 55px; margin-bottom: 25px; font-weight: bold; }
        .btn-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button {
            padding: 14px 5px; font-size: 14px; font-weight: bold;
            border-radius: 15px; border: none; cursor: pointer;
        }

        #yes { background: white; color: #ff4d6d; }
        #no { background: #ff4d4d; color: white; position: relative; transition: 0.2s; }

        .shaking { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            100% { transform: translate(1px, 1px); }
        }

        .heart {
            position: absolute; color: #ff4d6d; font-size: 25px;
            pointer-events: none; animation: fly 2s linear forwards;
        }
        @keyframes fly { 0% { opacity: 1; } 100% { transform: translateY(-200px); opacity: 0; } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="walker-area">
        <div class="cat-walker"></div>
        <div class="cat-walker" style="animation-delay: 1.5s;"></div>
        <div class="cat-walker" style="animation-delay: 3s;"></div>
    </div>

    <div class="avatar" id="catGif"></div>

    <div id="text" class="text">Maafin Rusdy ya... 👉👈</div>
    <div class="btn-wrapper" id="btnGroup">
        <button id="yes">Iyah dimaafin</button>
        <button id="no">Enggak!</button>
    </div>
</div>

<script>
    const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/2.mp3");
    music.loop = true;
    document.body.onclick = () => { music.play().catch(() => {}); };

    const catGifEl = document.getElementById("catGif");
    const textEl = document.getElementById("text");
    const cardEl = document.getElementById("mainCard");
    const noBtn = document.getElementById("no");

    let yesStep = 0;
    let noStep = 0;

    const content = {
        awal: "https://media.tenor.com/8m_l17VId8MAAAAC/cat-sad.gif",
        no: [
            { t: "Kok ditekan sih? Sedih tau.. 🥺", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-rTRYbFx38K.gif" },
            { t: "JANGAN DITEKAN TERUS! 😡", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-YNbTiWGdcr.gif" },
            { t: "AAAAAAHHH!!! JAHAT! 😱", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-xKnUJBPzZf.gif" },
            { t: "RUSDY NGAMBEK BENERAN!!! 😤", g: "https://raw.githubusercontent.com/rusdyXBT/Gifx/main/mala/fetchpik.com-QCaiGlMeJg.gif" }
        ],
        yes: [
            { t: "Beneran dimaafin nih? ✨", g: "https://media.tenor.com/GfV6S6I_h9AAAAAC/cat-cute.gif" },
            { t: "Hehe, makasih banyak yaaa! 🥰", g: "https://media.tenor.com/7966A0D7p88AAAAC/cat-smile.gif" },
            { t: "Mwah! Janji nggak nakal lagi! 🐱💕", g: "https://media.tenor.com/vFKqnCdLPNOKcAAAAC/kiss-cat.gif" }
        ]
    };

    catGifEl.style.backgroundImage = `url('${content.awal}')`;

    document.getElementById("yes").onclick = () => {
        cardEl.classList.remove("shaking");
        if (yesStep < content.yes.length) {
            textEl.innerHTML = content.yes[yesStep].t;
            catGifEl.style.backgroundImage = `url('${content.yes[yesStep].g}')`;
            yesStep++;
            createHeart();
        }
        if (yesStep === content.yes.length) {
            document.getElementById("btnGroup").style.display = "none";
            setInterval(createHeart, 250);
            cardEl.style.background = "rgba(255, 77, 109, 0.4)";
        }
    };

    function lari() {
        let idx = Math.min(noStep, content.no.length - 1);
        textEl.innerHTML = content.no[idx].t;
        catGifEl.style.backgroundImage = `url('${content.no[idx].g}')`;
        cardEl.classList.add("shaking");
        noStep++;

        noBtn.style.position = "fixed";
        const randomX = Math.floor(Math.random() * (window.innerWidth - 120)) + 40;
        const randomY = Math.floor(Math.random() * (window.innerHeight * 0.5)) + 100;
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); lari(); });
    noBtn.addEventListener("mouseover", lari);

    function createHeart() {
        const h = document.createElement("div");
        h.innerHTML = "❤️"; h.className = "heart";
        h.style.left = Math.random() * 80 + 10 + "%";
        h.style.top = "50%";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 2000);
    }
</script>
</body>
</html>
