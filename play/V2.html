<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permintaan Maaf Rusdy 😔</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* GANTI BACKGROUND UTAMA DI SINI */
            background: url('https://images.unsplash.com/photo-1516550893923-42d28e5677af?q=80&w=2072') no-repeat center center;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Overlay Gelap & Blur */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        /* Card Khusus Landscape */
        .card {
            display: flex;
            flex-direction: row; /* Elemen berjajar ke samping */
            align-items: center;
            width: 80%;
            max-width: 800px;
            padding: 30px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 2;
            gap: 30px;
        }

        /* Bagian Kiri: GIF/Avatar */
        .visual-container {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            /* GANTI GIF DI SINI */
            background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXIzZ3R4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4bmV4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/OPU6wUKARA8AU/giphy.gif') center/cover;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* Bagian Kanan: Teks & Tombol */
        .content-container {
            flex: 1.5;
            text-align: left;
        }

        .text {
            font-size: 20px;
            line-height: 1.5;
            min-height: 80px;
            margin-bottom: 20px;
            font-weight: 500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .buttons {
            position: relative;
            height: 100px;
            width: 100%;
        }

        button {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yes {
            background: #ffffff;
            color: #000;
            margin-right: 15px;
        }

        #yes:hover {
            transform: scale(1.1);
            background: #00ff88;
        }

        /* Tombol 'No' yang nakal */
        #no {
            background: #ff4d4d;
            color: white;
            position: absolute;
            left: 160px;
            top: 0;
            transition: all 0.2s ease-out;
            white-space: nowrap;
        }

        /* Animasi Background Sederhana */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .card { animation: float 4s ease-in-out infinite; }

        /* Responsif jika layar dipaksa tegak */
        @media (orientation: portrait) {
            .card { flex-direction: column; text-align: center; }
            .content-container { text-align: center; }
            #no { left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="visual-container">
        <div class="avatar"></div>
    </div>
    
    <div class="content-container">
        <div id="text" class="text"></div>
        <div class="buttons" id="btnArea">
            <button id="yes">Iyah, dimaafin kok 😊</button>
            <button id="no">Enggak! 😋</button>
        </div>
    </div>
</div>

<script>
/* 🎵 MUSIK - Ganti link mp3 di sini */
const music = new Audio("https://www.bensound.com/bensound-music/bensound-tenderness.mp3");
music.loop = true;

document.body.addEventListener("click", () => {
    music.play().catch(() => {});
}, { once: true });

/* 💬 PESAN */
const messages = [
    "Halo... Rusdy mau ngomong sesuatu 🥺",
    "Maafin Rusdy ya kalau ada salah kata atau perbuatan...",
    "Namanya juga manusia, kadang Rusdy suka khilaf 🙏",
    "Minal 'Aidin Walfaizin, Mohon Maaf Lahir dan Batin ✨",
    "Jadi... dimaafin gak nih? 👉👈"
];

let i = 0;
const textEl = document.getElementById("text");

function typeText(text) {
    let index = 0;
    textEl.innerHTML = "";
    const timer = setInterval(() => {
        textEl.innerHTML += text[index];
        index++;
        if (index >= text.length) clearInterval(timer);
    }, 40;
}

// Start pertama kali
typeText(messages[i]);

/* TOMBOL YES */
document.getElementById("yes").onclick = () => {
    i++;
    if (i < messages.length) {
        typeText(messages[i]);
    } else {
        typeText("Yeeayy! Makasih ya! Kamu emang yang terbaik! ❤️✨");
        document.getElementById("no").style.display = "none";
        document.getElementById("yes").style.display = "none";
    }
};

/* TOMBOL NO (KABUR) */
const noBtn = document.getElementById("no");
const btnArea = document.getElementById("btnArea");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton); // Untuk touch screen

function moveButton() {
    const padding = 20;
    const maxX = btnArea.clientWidth - noBtn.clientWidth - padding;
    const maxY = btnArea.clientHeight - noBtn.clientHeight - padding;

    // Posisi acak di dalam area tombol
    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}
</script>

</body>
</html>
