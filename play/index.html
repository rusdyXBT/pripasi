<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maafin Aku 😔</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url('https://i.imgur.com/3ZQ3Z4D.jpg') no-repeat center center;
  background-size: cover;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* overlay gelap + blur */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
}

/* bubble effect */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 10%, transparent 10%);
  background-size: 80px 80px;
  animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  100% { transform: translate(-200px,-200px); }
}

.card {
  width: 320px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
  text-align: center;
  position: relative;
  z-index: 2;
}

.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin: auto;
  background: url('https://i.imgur.com/6qK0Q6C.png') center/cover;
  border: 3px solid white;
}

.text {
  margin-top: 15px;
  font-size: 16px;
  min-height: 90px;
  white-space: pre-line;
}

.buttons {
  margin-top: 20px;
  position: relative;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  margin: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

#yes {
  background: white;
  color: black;
}

#no {
  background: transparent;
  border: 2px solid white;
  color: white;
  position: absolute;
}
</style>
</head>

<body>

<div class="card">
  <div class="avatar"></div>
  <div id="text" class="text"></div>

  <div class="buttons">
    <button id="yes">Mauu</button>
    <button id="no">Gamauu</button>
  </div>
</div>

<script>
/* =========================
   🎵 MUSIK (GITHUB RAW)
========================= */
const music = new Audio("https://raw.githubusercontent.com/rusdyXBT/pripasi/main/play/1.mp3");
music.loop = true;
music.volume = 0.5;

// autoplay saat klik pertama
document.body.addEventListener("click", () => {
  music.play().catch(() => {});
}, { once: true });

/* =========================
   💬 TEXT + TYPING
========================= */
const messages = [
"Upps! 😢\nHari raya ini harus saling maaf²an yaa 👀🤝",
"Minall 'Aidin Wal Faizin ✨",
"Mohon maaf lahir dan batin dari aku untuk kamuuu 🤭",
"Aku mau minta maaf atas semua kesalahan yang mungkin pernah aku lakukan...",
"Kamu mau maafin aku, kan? 🥺"
];

let i = 0;
const textEl = document.getElementById("text");

function typeText(text, speed = 35) {
  let index = 0;
  textEl.innerHTML = "";

  const interval = setInterval(() => {
    textEl.innerHTML += text.charAt(index);
    index++;
    if (index >= text.length) clearInterval(interval);
  }, speed);
}

typeText(messages[i]);

/* =========================
   ✅ MAUU
========================= */
document.getElementById("yes").onclick = () => {
  i++;
  if (i < messages.length) {
    typeText(messages[i]);
  } else {
    typeText("Makasih yaa udah maafin aku 😭❤️");
    document.querySelector(".buttons").style.display = "none";
  }
};

/* =========================
   ❌ GAMAU (kabur)
========================= */
const noBtn = document.getElementById("no");

noBtn.onclick = () => {
  const x = Math.random() * 250 - 125;
  const y = Math.random() * 150 - 75;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
};
</script>

</body>
</html>
